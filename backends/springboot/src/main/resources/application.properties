spring.application.name=todo-backend-spring

server.port=${SERVER_PORT}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Schema initialization is handled centrally by the shared PostgreSQL init layer.
spring.sql.init.mode=never

# Throw exceptions for unknown routes so we can convert them into the same
# compact JSON 404 response used by the Express backend.
spring.mvc.throw-exception-if-no-handler-found=true

# Disable default static resource mappings so unknown routes are not intercepted
# by the resource handler before our custom 404 logic runs.
spring.web.resources.add-mappings=false

# Keep default error payload generation out of the way because parity is handled
# explicitly through GlobalExceptionHandler.
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false