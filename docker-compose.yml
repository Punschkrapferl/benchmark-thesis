services:
  # Shared PostgreSQL instance used by all benchmark backends.
  # Database creation happens via db/init on first startup.
  # Reset and seed operations are executed explicitly by benchmark scripts.
  postgres:
    image: postgres:15.17
    container_name: benchmark-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB?POSTGRES_DB is required}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER?POSTGRES_USER is required} -d ${POSTGRES_DB?POSTGRES_DB is required}"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    networks:
      benchmark-net:
        aliases:
          - postgres

  # Express backend container.
  express:
    build:
      context: ./backends/express
      dockerfile: Dockerfile
    container_name: benchmark-express
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3001
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: todo_express
      DB_USER: ${POSTGRES_USER?POSTGRES_USER is required}
      DB_PASSWORD: ${POSTGRES_PASSWORD?POSTGRES_PASSWORD is required}
      DB_POOL_MAX: 10
      DB_IDLE_TIMEOUT_MS: 30000
      DB_CONNECTION_TIMEOUT_MS: 2000
    ports:
      - "3001:3001"
    networks:
      - benchmark-net

  # Spring Boot backend container.
  # Gradle is the active build system for this backend.
  springboot:
    build:
      context: ./backends/springboot
      dockerfile: Dockerfile
    container_name: benchmark-springboot
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/todo_springboot
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER?POSTGRES_USER is required}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD?POSTGRES_PASSWORD is required}
    ports:
      - "8080:8080"
    networks:
      - benchmark-net

  # ASP.NET backend container.
  aspnet:
    build:
      context: ./backends/aspnet
      dockerfile: Dockerfile
    container_name: benchmark-aspnet
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_URLS: http://+:8081
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=todo_aspnet;Username=${POSTGRES_USER?POSTGRES_USER is required};Password=${POSTGRES_PASSWORD?POSTGRES_PASSWORD is required}
    ports:
      - "8081:8081"
    networks:
      - benchmark-net

  # FastAPI backend container.
  # The current benchmark runner expects FastAPI on localhost:8082.
  fastapi:
    build:
      context: ./backends/fastapi
      dockerfile: Dockerfile
    container_name: benchmark-fastapi
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_NAME: todo-backend-fastapi
      PORT: 8082
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: todo_fastapi
      DB_USER: ${POSTGRES_USER?POSTGRES_USER is required}
      DB_PASSWORD: ${POSTGRES_PASSWORD?POSTGRES_PASSWORD is required}
      DB_POOL_MIN_SIZE: 1
      DB_POOL_MAX_SIZE: 10
      DB_POOL_TIMEOUT_SECONDS: 10
    ports:
      - "8082:8082"
    networks:
      - benchmark-net

volumes:
  postgres_data:

networks:
  benchmark-net:
    name: benchmark-net
    driver: bridge